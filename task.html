<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Filter Gallery</title>
      <link rel="stylesheet" href="styles1.css">
</head>
<body>

    <h1>IMAGE GALLERY</h1>

    <div class="filters">
        <button class="btn active" onclick="filterImg('all', this)">All</button>
        <button class="btn" onclick="filterImg('nature', this)">Nature</button>
        <button class="btn" onclick="filterImg('cars', this)">Cars</button>
        <button class="btn" onclick="filterImg('tech', this)">Tech</button>
    </div>
    <div class="gallery">
        <div class="item" data-cat="nature" onclick="openLightbox(0)"><img src="https://png.pngtree.com/thumb_back/fh260/background/20230411/pngtree-nature-forest-sun-ecology-image_2256183.jpg" lt="Nature"><div class="overlay">🔍 View</div></div>
        <div class="item" data-cat="cars" onclick="openLightbox(1)"><img src="https://i.redd.it/came-across-it-on-the-internet-found-the-design-very-v0-ksfrpn6sxoqe1.jpg?width=747&format=pjpg&auto=webp&s=b46c8d9848fe061912fcb3453b199673e8684cc8" alt="Cars"><div class="overlay">🔍 View</div></div>
        <div class="item" data-cat="tech" onclick="openLightbox(2)"><img src="https://kpmg.com/content/dam/kpmgsites/in/images/2025/09/smart-tech-with-human-touch-the-future-of-hr-with-ai.jpg" alt="Tech"><div class="overlay">🔍 View</div></div>
        <div class="item" data-cat="nature" onclick="openLightbox(3)"><img src="https://png.pngtree.com/background/20250109/original/pngtree-picsart-editing-background-with-nature-and-tree-google-vignette-photos-picture-image_15522923.jpg" alt="Nature"><div class="overlay">🔍 View</div></div>
        <div class="item" data-cat="cars" onclick="openLightbox(4)"><img src="https://static0.pocketlintimages.com/wordpress/wp-content/uploads/141843-cars-feature-techrules-at96-trev-image1-lffzvrp3ql.jpg?w=1600&h=900&fit=crop" alt="Cars"><div class="overlay">🔍 View</div></div>
        <div class="item" data-cat="tech" onclick="openLightbox(5)"><img src="https://www.theforage.com/blog/wp-content/uploads/2022/09/tech-companies.jpg" alt="Tech"><div class="overlay">🔍 View</div></div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <button class="nav-btn prev-btn" onclick="changeImg(-1)">&#10094;</button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="View">
        <button class="nav-btn next-btn" onclick="changeImg(1)">&#10095;</button>
    </div>

    <script src="script1.js"></script>
    </body>
</html>
